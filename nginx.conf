events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
# ----- load blacnace ----- 
  upstream shiny_backend {
    hash $remote_addr consistent;
    server glatar-shiny-1:3838;
    server glatar-shiny-2:3838;
    server glatar-shiny-3:3838;
  }

  # HTTP -> HTTPS + Certbot challenge
  server {
    listen 80;
    listen [::]:80;
    server_name glatar.org www.glatar.org;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      allow all;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server (uncomment after certs are issued)
   server {
    listen 443 ssl;
    listen [::]:443 ssl;
     http2 on;
   server_name glatar.org www.glatar.org;
  
    ssl_certificate     /etc/letsencrypt/live/glatar.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glatar.org/privkey.pem;
     ssl_protocols TLSv1.2 TLSv1.3;
     ssl_prefer_server_ciphers off;
     client_max_body_size 20M;
     location / {
      proxy_pass http://shiny_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 20d;
      proxy_send_timeout 20d;
     }
  }
}