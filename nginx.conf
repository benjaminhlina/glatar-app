events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }
# ----- load blacnace ----- 
  upstream shiny_backend {
    hash $remote_addr consistent;
    server glatar-shiny-1:3838 max_fails=3 fail_timeout=10s;
    server glatar-shiny-2:3838 max_fails=3 fail_timeout=10s;
    server glatar-shiny-3:3838 max_fails=3 fail_timeout=10s;
  }

  # HTTP -> HTTPS + Certbot challenge
  server {
    listen 80;
    listen [::]:80;
    server_name glatar.org www.glatar.org;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
      allow all;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server (uncomment after certs are issued)
   server {
    listen 443 ssl;
    listen [::]:443 ssl;
     http2 on;
   server_name glatar.org www.glatar.org;
  
    ssl_certificate     /etc/letsencrypt/live/glatar.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glatar.org/privkey.pem;
     ssl_protocols TLSv1.2 TLSv1.3;
     ssl_prefer_server_ciphers off;
     client_max_body_size 20M;

     # ---- Warmup page ----
    proxy_intercept_errors on; 
      error_page 502 503 504 =200 @warming_up;

    location @warming_up {
      dd_header Refresh "5" always;
      add_header Cache-Control "no-store" always;
      try_files /warming_up.html =200;
      }

     location / {
      proxy_pass http://shiny_backend;
       proxy_next_upstream error timeout http_502 http_503 http_504;
       proxy_next_upstream_tries 3;
       proxy_next_upstream_timeout 30s;
       proxy_connect_timeout 5s;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection $connection_upgrade;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 2s;
      proxy_read_timeout 5s;
       # could change these to 20 s 
      #  proxy_read_timeout 20d; 
      #  proxy_send_timeout 20d;
     }
  }
}